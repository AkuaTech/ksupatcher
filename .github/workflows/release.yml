name: Build And Release APK

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/release.yml
      - gradlew
      - gradlew.bat
      - settings.gradle.kts
      - build.gradle.kts
      - gradle.properties
      - gradle/wrapper/**
      - app/build.gradle.kts
      - app/proguard-rules.pro
      - app/src/**

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SHORT_SHA: ${{ github.sha }}
      ORG_GRADLE_PROJECT_ciVersionName: ${{ github.sha }}
      ORG_GRADLE_PROJECT_ciVersionCode: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_ciVersionName=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Generate release notes
        run: |
          set -euo pipefail
          release_notes_file="$RUNNER_TEMP/release-notes.txt"
          git log -1 --pretty=%B > "$release_notes_file"
          printf '\n\n(Automated release for commit %s)\n' "$GITHUB_SHA" >> "$release_notes_file"
          echo "RELEASE_NOTES_FILE=$release_notes_file" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-signing-key.p12
          {
            printf 'storeFile=%s\n' "release-signing-key.p12"
            printf 'storeType=%s\n' "PKCS12"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > key.properties

      - name: Build signed release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        run: |
          set -euo pipefail
          apk_path="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Release APK not found" >&2
            exit 1
          fi
          release_apk="app/build/outputs/apk/release/ksupatcher-${SHORT_SHA}.apk"
          cp "$apk_path" "$release_apk"
          echo "RELEASE_APK=$release_apk" >> "$GITHUB_ENV"

      - name: Generate SHA-256 file
        run: |
          set -euo pipefail
          checksum_file="${RELEASE_APK}.sha256"
          cd "$(dirname "$RELEASE_APK")"
          sha256sum "$(basename "$RELEASE_APK")" > "$(basename "$checksum_file")"
          echo "RELEASE_SHA256=$checksum_file" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$SHORT_SHA" >/dev/null 2>&1; then
            gh release upload "$SHORT_SHA" "$RELEASE_APK" "$RELEASE_SHA256" --clobber
            gh release edit "$SHORT_SHA" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$SHORT_SHA" "$RELEASE_APK" "$RELEASE_SHA256" \
              --target "$GITHUB_SHA" \
              --title "$SHORT_SHA" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
